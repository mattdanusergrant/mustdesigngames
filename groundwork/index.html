<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#bfe3f2">
<title>Groundwork — prototype</title>
<!-- #LLM-generated -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #bfe3f2;
    touch-action: none; overscroll-behavior: none;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #34433f; }
  canvas { display: block; width: 100%; height: 100%; }

  /* Job sheet */
  #sheet { position: fixed; top: 14px; right: 14px; width: 234px; padding: 14px 16px 12px;
    background: rgba(255,253,247,.92); border-radius: 16px;
    box-shadow: 0 6px 22px rgba(60,80,70,.22); user-select: none; }
  #sheet h1 { font-size: 14px; letter-spacing: .12em; text-transform: uppercase;
    color: #8a9b8f; margin-bottom: 4px; }
  #sheet h2 { font-size: 19px; margin-bottom: 10px; color: #3a4a42; }
  .task { display: flex; align-items: center; gap: 9px; font-size: 14.5px;
    padding: 5px 0; line-height: 1.25; }
  .box { flex: 0 0 20px; width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid #c4cfc7; display: grid; place-items: center;
    font-size: 13px; color: #fff; transition: background .25s, border-color .25s; }
  .task.done .box { background: #7bc47f; border-color: #7bc47f; }
  .task.done .label { color: #9aa8a0; text-decoration: line-through; }
  .count { margin-left: auto; font-variant-numeric: tabular-nums; color: #9aa8a0;
    font-size: 13px; }

  /* READY bar */
  #readyWrap { margin-top: 12px; }
  #readyTop { display: flex; justify-content: space-between; font-size: 12px;
    letter-spacing: .1em; text-transform: uppercase; color: #8a9b8f; margin-bottom: 5px; }
  #bar { height: 10px; background: #e7ece8; border-radius: 6px; overflow: hidden; }
  #fill { height: 100%; width: 0%; border-radius: 6px;
    background: linear-gradient(90deg,#9ad3a0,#7bc47f); transition: width .4s ease; }

  /* Hint */
  #hint { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: rgba(255,253,247,.92); padding: 9px 18px; border-radius: 20px;
    font-size: 15px; font-weight: 500; box-shadow: 0 4px 14px rgba(60,80,70,.18);
    user-select: none; pointer-events: none; max-width: 88vw; text-align: center;
    transition: opacity .4s; }

  /* Reset */
  #reset { position: fixed; top: 14px; left: 14px; width: 40px; height: 40px;
    border: none; border-radius: 12px; background: rgba(255,253,247,.92); cursor: pointer;
    font-size: 20px; color: #6a7b70; box-shadow: 0 4px 14px rgba(60,80,70,.18); }
  #reset:active { transform: scale(.94); }

  /* Done overlay */
  #done { position: fixed; inset: 0; display: none; place-items: center;
    pointer-events: none; }
  #stamp { padding: 22px 40px; background: rgba(255,253,247,.96); border-radius: 22px;
    box-shadow: 0 12px 40px rgba(60,80,70,.3); text-align: center;
    transform: scale(.6) rotate(-7deg); opacity: 0; transition: transform .5s
    cubic-bezier(.2,1.3,.4,1), opacity .5s; }
  #done.show #stamp { transform: scale(1) rotate(-7deg); opacity: 1; }
  #stamp .big { font-size: 30px; font-weight: 800; letter-spacing: .04em; color: #5aa861; }
  #stamp .sub { font-size: 15px; color: #8a9b8f; margin-top: 6px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="sheet">
  <h1>Job Sheet</h1>
  <h2>Parcel 01 — "Hollow Field"</h2>
  <div id="tasks"></div>
  <div id="readyWrap">
    <div id="readyTop"><span>Ready</span><span id="pct">0%</span></div>
    <div id="bar"><div id="fill"></div></div>
  </div>
</div>

<button id="reset" title="Restart parcel">↻</button>
<div id="hint">Drag to look around. Tap the old shacks to knock them down.</div>
<div id="done"><div id="stamp"><div class="big">PARCEL READY ✓</div>
  <div class="sub">All shiny and new. Hand it to the city builders.</div></div></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---- Scene, camera, renderer -------------------------------------------------
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#bfe3f2');
scene.fog = new THREE.Fog('#bfe3f2', 70, 130);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
camera.position.set(2, 30, 38);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 22; controls.maxDistance = 70;
controls.minPolarAngle = 0.25; controls.maxPolarAngle = 1.35;
controls.target.set(0, 0, 0);

// ---- Lights ------------------------------------------------------------------
scene.add(new THREE.HemisphereLight('#eaf6ff', '#7e9c7a', 0.9));
const sun = new THREE.DirectionalLight('#fff3da', 1.15);
sun.position.set(18, 30, 14); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const s = sun.shadow.camera; s.left = -30; s.right = 30; s.top = 30; s.bottom = -30; s.far = 90;
scene.add(sun);

// ---- Ground parcel -----------------------------------------------------------
const PAD = 22; // half-extent
const padMat = new THREE.MeshStandardMaterial({ color: '#8fc486', roughness: 1 });
const ground = new THREE.Mesh(new THREE.BoxGeometry(PAD * 2, 1.4, PAD * 2), padMat);
ground.position.y = -0.7; ground.receiveShadow = true; scene.add(ground);
// dirt apron under the grass so dug areas read as soil
const dirt = new THREE.Mesh(new THREE.BoxGeometry(PAD * 2 - 0.6, 1.2, PAD * 2 - 0.6),
  new THREE.MeshStandardMaterial({ color: '#a9855f', roughness: 1 }));
dirt.position.y = -0.9; scene.add(dirt);
// low fence frame
const fenceMat = new THREE.MeshStandardMaterial({ color: '#caa97f', roughness: 1 });
for (let i = -PAD; i <= PAD; i += 4) {
  for (const [x, z] of [[i, -PAD], [i, PAD], [-PAD, i], [PAD, i]]) {
    const post = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.6, 0.4), fenceMat);
    post.position.set(x, 0.2, z); post.castShadow = true; scene.add(post);
  }
}

// ---- Helpers -----------------------------------------------------------------
const clickable = [];                       // raycast targets
const ray = new THREE.Raycaster();
const anims = [];                           // [{t,dur,fn}] per-frame tweens
const tween = (dur, fn, done) => anims.push({ t: 0, dur, fn, done });
const rand = (a, b) => a + Math.random() * (b - a);
function popIn(obj, scale = 1, dur = 0.45) {  // squash-stretch entrance
  obj.scale.setScalar(0.01);
  tween(dur, (p) => obj.scale.setScalar(scale * (1 + 0.25 * Math.sin(p * Math.PI)) * Math.min(1, p * 1.6)));
}
function popOut(obj, dur = 0.3, after) {
  const s0 = obj.scale.x;
  tween(dur, (p) => obj.scale.setScalar(s0 * (1 - p)), () => { scene.remove(obj); after && after(); });
}

// tiny WebAudio juice
let actx;
function blip(freq, type = 'sine', dur = 0.12, vol = 0.18) {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq; o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
    o.start(); o.stop(actx.currentTime + dur);
  } catch (e) {}
}

// ---- Game state --------------------------------------------------------------
let state;
function resetState() { state = {
  structTotal: 2, structDone: 0,
  debrisSeen: 0, debrisCleared: 0,           // debris frac = cleared / seen
  pond: 0, treeTotal: 5, treePlanted: 0, finished: false }; }

// ---- Debris ------------------------------------------------------------------
function spawnDebris(x, z, n = 1, fromDemo = false) {
  for (let i = 0; i < n; i++) {
    const sz = rand(0.8, 1.5);
    const m = new THREE.Mesh(new THREE.BoxGeometry(sz, sz * 0.7, sz),
      new THREE.MeshStandardMaterial({ color: fromDemo ? '#b08968' : '#9a9389', roughness: 1 }));
    m.position.set(x + rand(-1.6, 1.6), sz * 0.35, z + rand(-1.6, 1.6));
    m.rotation.set(rand(0, 6), rand(0, 6), rand(0, 6));
    m.castShadow = true; m.userData.kind = 'debris';
    scene.add(m); clickable.push(m);
    state.debrisSeen++;
    if (fromDemo) popIn(m, 1, 0.35);
  }
}

// ---- Shacks ------------------------------------------------------------------
function makeShack(x, z, rot) {
  const g = new THREE.Group(); g.position.set(x, 0, z); g.rotation.y = rot;
  const body = new THREE.Mesh(new THREE.BoxGeometry(3.4, 2.6, 3),
    new THREE.MeshStandardMaterial({ color: '#9c6f4e', roughness: 1 }));
  body.position.y = 1.3; body.castShadow = true; g.add(body);
  const roof = new THREE.Mesh(new THREE.ConeGeometry(2.9, 1.7, 4),
    new THREE.MeshStandardMaterial({ color: '#7a4f37', roughness: 1 }));
  roof.position.y = 3.4; roof.rotation.y = Math.PI / 4; roof.castShadow = true; g.add(roof);
  g.rotation.z = rand(-0.05, 0.05);            // derelict lean
  g.userData = { kind: 'structure', x, z };
  g.traverse(o => { if (o.isMesh) clickable.push(o); });
  scene.add(g);
  return g;
}

// ---- Pond zone ---------------------------------------------------------------
let pondGroup, water;
function makePond(x, z, r) {
  pondGroup = new THREE.Group(); pondGroup.position.set(x, 0, z); scene.add(pondGroup);
  const ring = new THREE.Mesh(new THREE.RingGeometry(r - 0.25, r, 48),
    new THREE.MeshBasicMaterial({ color: '#4ba3c3', transparent: true, opacity: 0.85, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI / 2; ring.position.y = 0.06; pondGroup.add(ring);
  water = new THREE.Mesh(new THREE.CircleGeometry(r - 0.4, 40),
    new THREE.MeshStandardMaterial({ color: '#54b3d6', roughness: 0.25, metalness: 0.1,
      transparent: true, opacity: 0.9 }));
  water.rotation.x = -Math.PI / 2; water.position.y = -0.45; water.scale.setScalar(0.01);
  pondGroup.add(water);
  // invisible but raycastable dig pad
  const pad = new THREE.Mesh(new THREE.CircleGeometry(r, 24),
    new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false }));
  pad.rotation.x = -Math.PI / 2; pad.position.y = 0.04; pad.userData.kind = 'pond';
  pondGroup.add(pad); clickable.push(pad);
}

// ---- Tree markers ------------------------------------------------------------
function makeTreeMarker(x, z) {
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.7, 0.95, 24),
    new THREE.MeshBasicMaterial({ color: '#7bc47f', transparent: true, opacity: 0.9, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI / 2; ring.position.set(x, 0.07, z);
  ring.userData = { kind: 'marker', x, z, t: rand(0, 6) };
  scene.add(ring); clickable.push(ring);
  return ring;
}
function plantTree(x, z) {
  const g = new THREE.Group(); g.position.set(x, 0, z);
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.26, 1.4, 6),
    new THREE.MeshStandardMaterial({ color: '#8a5a3b', roughness: 1 }));
  trunk.position.y = 0.7; trunk.castShadow = true; g.add(trunk);
  for (const [y, r] of [[1.7, 1.25], [2.5, 0.9]]) {
    const f = new THREE.Mesh(new THREE.ConeGeometry(r, 1.5, 7),
      new THREE.MeshStandardMaterial({ color: '#6bbf73', roughness: 1 }));
    f.position.y = y; f.castShadow = true; g.add(f);
  }
  scene.add(g); popIn(g, 1, 0.5);
}

// ---- Build / rebuild the parcel ----------------------------------------------
let markers = [];
function build() {
  // clear previous
  for (const o of clickable) o.parent && o.parent.remove(o);
  clickable.length = 0; markers.length = 0;
  resetState();

  makeShack(-9, -6, 0.4);
  makeShack(-11, 6, -0.3);
  // a little starting litter so haul has immediate feedback
  spawnDebris(-2, 9, 3);
  makePond(10, 9, 4.5);
  const tx0 = -4, tz = -13;
  for (let i = 0; i < 5; i++) markers.push(makeTreeMarker(tx0 + i * 4, tz));

  document.getElementById('done').classList.remove('show');
  document.getElementById('done').style.display = 'none';
  controls.autoRotate = false;
  updateHUD();
}

// ---- Interaction -------------------------------------------------------------
function act(obj) {
  const kind = obj.userData.kind || (obj.parent && obj.parent.userData.kind);
  if (state.finished) return;

  if (kind === 'structure') {
    const g = obj.userData.kind ? obj : obj.parent;      // the group
    const { x, z } = g.userData;
    // remove shack meshes from clickable, collapse the group, leave debris
    g.traverse(o => { const i = clickable.indexOf(o); if (i >= 0) clickable.splice(i, 1); });
    popOut(g, 0.28);
    spawnDebris(x, z, 6, true);
    state.structDone++;
    blip(110, 'square', 0.18, 0.22); setTimeout(() => blip(80, 'square', 0.16, 0.18), 60);
    hint(state.structDone < state.structTotal
      ? 'Timber! One more shack to go.'
      : 'Now tap the rubble to haul it away.');
  } else if (kind === 'debris') {
    const i = clickable.indexOf(obj); if (i >= 0) clickable.splice(i, 1);
    popOut(obj, 0.25);
    state.debrisCleared++;
    blip(520, 'triangle', 0.09, 0.16);
    if (debrisFrac() >= 1) hint('Spotless. Tap inside the blue ring to dig the pond.');
  } else if (kind === 'pond') {
    if (state.pond >= 1) return;
    state.pond = Math.min(1, state.pond + 0.2);
    water.scale.setScalar(Math.max(0.05, state.pond));
    blip(300 + state.pond * 220, 'sine', 0.16, 0.18);
    hint(state.pond >= 1 ? 'Pond filled. Tap the green rings to plant the trees.'
      : 'Keep digging…');
  } else if (kind === 'marker') {
    const { x, z } = obj.userData;
    const i = clickable.indexOf(obj); if (i >= 0) clickable.splice(i, 1);
    scene.remove(obj);
    plantTree(x, z);
    state.treePlanted++;
    blip(660, 'sine', 0.14, 0.16); setTimeout(() => blip(880, 'sine', 0.16, 0.14), 70);
    if (state.treePlanted < state.treeTotal) hint('Nice. Keep planting the line.');
  }
  updateHUD();
}

// pulse the green tree-marker rings so they read as "tap me"
function pulseMarkers(time) {
  for (const m of clickable) if (m.userData && m.userData.kind === 'marker')
    m.material.opacity = 0.55 + 0.35 * Math.sin(time * 3 + m.userData.t);
}

// ---- HUD ---------------------------------------------------------------------
const debrisFrac = () => state.debrisSeen ? state.debrisCleared / state.debrisSeen : 0;
function tasksDef() { return [
  ['Demolish the shacks', state.structDone, state.structTotal, state.structDone >= state.structTotal],
  ['Clear all debris', Math.round(debrisFrac() * 100) + '%', '', state.debrisSeen > 0 && state.debrisCleared >= state.debrisSeen],
  ['Dig the pond', Math.round(state.pond * 100) + '%', '', state.pond >= 1],
  ['Plant the trees', state.treePlanted, state.treeTotal, state.treePlanted >= state.treeTotal],
]; }
function updateHUD() {
  const el = document.getElementById('tasks');
  el.innerHTML = tasksDef().map(([label, a, b, done]) =>
    `<div class="task ${done ? 'done' : ''}"><span class="box">${done ? '✓' : ''}</span>` +
    `<span class="label">${label}</span><span class="count">${b !== '' ? a + '/' + b : a}</span></div>`
  ).join('');
  const fracs = [state.structDone / state.structTotal, debrisFrac(), state.pond, state.treePlanted / state.treeTotal];
  const pct = Math.round(100 * fracs.reduce((s, f) => s + Math.min(1, f), 0) / 4);
  document.getElementById('fill').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
  if (pct === 100 && !state.finished) finish();
}
let hintTimer;
function hint(txt) {
  const h = document.getElementById('hint');
  h.textContent = txt; h.style.opacity = '1';
}

// ---- Finish ------------------------------------------------------------------
function finish() {
  state.finished = true;
  padMat.color.set('#9ad98f');                 // grass freshens up
  controls.autoRotate = true; controls.autoRotateSpeed = 1.2;
  hint('Parcel ready. Hand it off — the city builders take it from here.');
  blip(523, 'sine', 0.18, 0.2);
  [659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 'sine', 0.22, 0.18), 120 + i * 130));
  const d = document.getElementById('done');
  d.style.display = 'grid'; requestAnimationFrame(() => d.classList.add('show'));
}

// ---- Input (tap = act, drag = orbit) -----------------------------------------
let downAt = null;
function xy(e) { const t = e.touches ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; }
renderer.domElement.addEventListener('pointerdown', e => { downAt = xy(e); });
renderer.domElement.addEventListener('pointerup', e => {
  if (!downAt) return;
  const p = xy(e), moved = Math.hypot(p.x - downAt.x, p.y - downAt.y);
  downAt = null;
  if (moved > 8) return;                        // it was a drag → let OrbitControls have it
  const ndc = new THREE.Vector2((p.x / innerWidth) * 2 - 1, -(p.y / innerHeight) * 2 + 1);
  ray.setFromCamera(ndc, camera);
  const hit = ray.intersectObjects(clickable, false)[0];
  if (hit) act(hit.object);
});
document.getElementById('reset').addEventListener('click', build);

// ---- Loop --------------------------------------------------------------------
function resize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

const clock = new THREE.Clock();
function frame() {
  const dt = clock.getDelta(), t = clock.elapsedTime;
  for (let i = anims.length - 1; i >= 0; i--) {
    const a = anims[i]; a.t += dt; const p = Math.min(1, a.t / a.dur);
    a.fn(p); if (p >= 1) { a.done && a.done(); anims.splice(i, 1); }
  }
  pulseMarkers(t);
  if (water) water.material.opacity = 0.78 + 0.12 * Math.sin(t * 2);  // gentle shimmer
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

build();
frame();
</script>
</body>
</html>
