<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Apple Farmer Simulator</title>
<meta name="description" content="Apple Farmer Simulator — thin your fruit, sling apples at pests GTA-style, run IPM, and sell your harvest direct-to-consumer. One orchard, endless drama.">
<meta property="og:title" content="Apple Farmer Simulator">
<meta property="og:description" content="Thin fruit, sling apples at pests, run IPM, sell your harvest. One orchard, endless local drama.">
<style>
  :root{
    --grass:#6fae4f; --grass2:#5d9e42; --soil:#7c5a3a;
    --cream:#fff3e0; --line:#e6c596; --ink:#3a2a1a;
    --apple:#e23b3b; --leaf:#3fa34d; --gold:#f2b134; --eco:#34a36b; --rep:#c065c8;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#3a2a1a;color:var(--ink);
    font-family:ui-rounded,"Trebuchet MS",ui-sans-serif,system-ui,sans-serif;
    user-select:none;-webkit-user-select:none;touch-action:none}
  #app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;
    background:var(--grass);position:relative;overflow:hidden}
  #hud{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:5px;align-items:center;
    padding:7px 9px;background:var(--cream);border-bottom:3px solid var(--line);z-index:5}
  .stat{display:flex;flex-direction:column;align-items:center;line-height:1}
  .stat .lbl{color:#a9824a;font-size:9px;text-transform:uppercase;letter-spacing:.06em;font-weight:800}
  .stat .val{font-weight:900;font-size:17px;margin-top:2px}
  .stat.cash .val{color:var(--leaf)} .stat.eco .val{color:var(--eco)}
  .stat.rep .val{color:var(--rep)} .stat.season .val{color:var(--apple)}
  #mute{background:#ffe9c4;border:2px solid var(--line);border-radius:9px;width:36px;height:36px;
    font-size:17px;cursor:pointer}
  #boardwrap{flex:1;position:relative;overflow:hidden}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  /* bottom action bar */
  #bar{position:absolute;left:0;right:0;bottom:0;display:flex;gap:8px;justify-content:center;
    padding:10px;pointer-events:none;z-index:4}
  .tool{pointer-events:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:62px;height:58px;border-radius:14px;border:2px solid rgba(0,0,0,.15);
    background:rgba(255,255,255,.92);box-shadow:0 3px 0 rgba(0,0,0,.18);cursor:pointer;font-weight:800}
  .tool:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.18)}
  .tool .ic{font-size:22px;line-height:1}
  .tool .ct{font-size:11px;color:#555;margin-top:2px}
  .tool.dim{opacity:.4;filter:grayscale(.6)}
  /* timer + ammo strip */
  #strip{position:absolute;top:8px;left:8px;right:8px;display:flex;align-items:center;gap:8px;z-index:4;
    pointer-events:none}
  #timebar{flex:1;height:9px;background:rgba(0,0,0,.22);border-radius:5px;overflow:hidden}
  #timebar>i{display:block;height:100%;width:100%;background:var(--gold);transition:width .1s linear}
  #ammo{background:rgba(255,255,255,.92);border-radius:9px;padding:3px 9px;font-weight:900;font-size:14px;
    color:var(--apple);box-shadow:0 2px 0 rgba(0,0,0,.15)}
  #banner{position:absolute;top:16%;left:0;right:0;text-align:center;font-size:25px;font-weight:900;
    color:#fff;text-shadow:0 2px 0 #2a6e2a,0 0 14px rgba(0,0,0,.4);pointer-events:none;opacity:0;
    transition:opacity .25s;padding:0 12px;z-index:6}
  #banner.show{opacity:1}
  #toast{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.74);
    color:#fff;font-weight:700;font-size:13px;padding:6px 14px;border-radius:20px;opacity:0;
    transition:opacity .2s;pointer-events:none;z-index:6;white-space:nowrap}
  #toast.show{opacity:1}
  /* overlay / modal */
  #ov{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
    background:rgba(28,46,22,.86);z-index:10;padding:20px;text-align:center;overflow-y:auto}
  #ov.show{display:flex}
  #ov h1{font-size:34px;color:#fff;text-shadow:0 3px 0 var(--apple);letter-spacing:.02em;line-height:1.05}
  #ov h2{font-size:24px;color:#fff;text-shadow:0 2px 0 var(--apple);margin-bottom:4px}
  #ov .sub{color:#ffe9c4;margin:8px 0 14px;font-size:14px;max-width:360px;line-height:1.5}
  #ov .card{background:var(--cream);border-radius:16px;padding:16px 16px 18px;max-width:380px;width:100%;
    box-shadow:0 8px 0 rgba(0,0,0,.25);margin:6px 0}
  #ov .card p{font-size:14px;line-height:1.5;margin-bottom:12px;color:var(--ink)}
  #ov .rows{font-size:14px;color:var(--ink);margin:4px 0 12px;text-align:left}
  #ov .rows .r{display:flex;justify-content:space-between;padding:3px 2px;border-bottom:1px dashed #e1cba2}
  #ov .rows .r b{color:var(--leaf)}
  .btn{display:block;width:100%;padding:13px 16px;font-size:15px;font-weight:800;border:none;border-radius:12px;
    color:#fff;background:var(--apple);box-shadow:0 4px 0 #9e2626;cursor:pointer;margin:8px 0;letter-spacing:.01em}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #9e2626}
  .btn.green{background:var(--leaf);box-shadow:0 4px 0 #2c7536}
  .btn.green:active{box-shadow:0 1px 0 #2c7536}
  .btn.gold{background:var(--gold);color:#5a3d00;box-shadow:0 4px 0 #b07d12}
  .btn.gold:active{box-shadow:0 1px 0 #b07d12}
  .btn small{display:block;font-weight:600;font-size:11px;opacity:.92;margin-top:3px}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(.5)}
  #ov .tip{font-size:12px;color:#d8e8c8;margin-top:12px;max-width:360px;line-height:1.5}
  .shoprow{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--line);
    border-radius:12px;padding:9px 11px;margin:7px 0;text-align:left}
  .shoprow .si{font-size:24px}
  .shoprow .st{flex:1}
  .shoprow .st .sn{font-weight:800;font-size:14px}
  .shoprow .st .sd{font-size:11px;color:#7a6a55;line-height:1.35}
  .shoprow .buy{padding:9px 12px;font-weight:800;font-size:13px;border:none;border-radius:10px;color:#fff;
    background:var(--leaf);box-shadow:0 3px 0 #2c7536;cursor:pointer;white-space:nowrap}
  .shoprow .buy:active{transform:translateY(2px);box-shadow:0 1px 0 #2c7536}
  .shoprow .buy:disabled{background:#bdbdbd;box-shadow:0 3px 0 #8f8f8f;opacity:.7;cursor:not-allowed}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat cash"><span class="lbl">Cash</span><span class="val" id="vCash">$0</span></div>
    <div class="stat eco"><span class="lbl">Eco</span><span class="val" id="vEco">80</span></div>
    <div class="stat rep"><span class="lbl">Fans</span><span class="val" id="vRep">0</span></div>
    <div class="stat season"><span class="lbl">Season</span><span class="val" id="vSeason">1</span></div>
    <button id="mute" title="Sound">🔊</button>
  </div>
  <div id="boardwrap">
    <canvas id="cv"></canvas>
    <div id="strip">
      <div id="timebar"><i id="timeFill"></i></div>
      <div id="ammo">🍎 <span id="vAmmo">15</span></div>
    </div>
    <div id="bar">
      <div class="tool" id="toolLady"><span class="ic">🐞</span><span class="ct" id="ctLady">×1</span></div>
      <div class="tool" id="toolSpray"><span class="ic">🧪</span><span class="ct">Spray</span></div>
    </div>
    <div id="banner"></div>
    <div id="toast"></div>
    <div id="ov" class="show"></div>
  </div>
</div>
<script>
"use strict";
(function(){
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const elCash=$('vCash'), elEco=$('vEco'), elRep=$('vRep'), elSeason=$('vSeason'), elAmmo=$('vAmmo'),
      timeFill=$('timeFill'), banner=$('banner'), toast=$('toast'), ov=$('ov'),
      toolLady=$('toolLady'), toolSpray=$('toolSpray'), ctLady=$('ctLady'), muteBtn=$('mute');

// ---------- config ----------
const CFG={
  seasonLen:62,           // seconds per season
  baseSpeed:172,          // player px/s
  thinRange:62, thinRate:0.7,   // quality gained per second when thinning
  ammoBase:15,
  windfallEvery:2.6,      // seconds between windfall drops
  ecoStart:80,
};

// ---------- audio ----------
let muted=false, AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function beep(f,d,type,g,slide){ if(muted)return; const a=ac(); if(!a)return;
  const o=a.createOscillator(), v=a.createGain(); o.type=type||'square';
  o.frequency.setValueAtTime(f,a.currentTime);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,slide),a.currentTime+d);
  v.gain.setValueAtTime(g||0.12,a.currentTime);
  v.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+d);
  o.connect(v); v.connect(a.destination); o.start(); o.stop(a.currentTime+d); }
const sThrow =()=>beep(620,0.10,'square',0.07,260);
const sSplat =()=>beep(150,0.14,'sawtooth',0.16,60);
const sMiss  =()=>beep(220,0.06,'sine',0.05);
const sDing  =()=>{beep(880,0.09,'square',0.12,0);setTimeout(()=>beep(1320,0.10,'square',0.10),80);};
const sThin  =()=>beep(520,0.06,'triangle',0.08,720);
const sLady  =()=>{beep(700,0.1,'sine',0.1,1100);};
const sSpray =()=>beep(300,0.3,'sawtooth',0.14,90);
const sBad   =()=>beep(120,0.3,'sawtooth',0.16,70);

// ---------- layout ----------
let W=0,H=0,dpr=1;
function resize(){
  const r=cv.getBoundingClientRect(); dpr=Math.min(window.devicePixelRatio||1,2);
  W=r.width; H=r.height;
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(G&&G.trees.length) placeTrees();
}
window.addEventListener('resize',resize);

// ---------- game state ----------
let G=null, running=false, paused=true, lastT=0, acc=0;

function newRun(){
  G={
    cash:35, eco:CFG.ecoStart, rep:0, season:1,
    up:{ammo:0,speed:0,lady:0,water:0,sign:0,prune:0,trap:0},
    // per-season
    timeLeft:CFG.seasonLen,
    player:{x:W/2,y:H/2,vx:0,vy:0,r:16,recoil:0},
    trees:[], pests:[], shots:[], parts:[], windfalls:[],
    ammo:CFG.ammoBase, ladyLeft:1,
    windTimer:0, spawnTimer:1.2, thinTree:null, thinShow:0,
    splatted:0, lostFruit:0, sprayUses:0,
  };
  placeTrees();
  resetSeason(true);
}
function placeTrees(){
  // 6 trees in 2 rows, leave margins for the action bar & strip
  const cols=3, rows=2, n=cols*rows;
  if(G.trees.length!==n){ G.trees=[]; for(let i=0;i<n;i++) G.trees.push(makeTree(i)); }
  const padX=W*0.16, padTop=H*0.26, padBot=H*0.30;
  const gw=(W-padX*2)/(cols-1), gh=(H-padTop-padBot)/(rows-1);
  for(let i=0;i<n;i++){ const c=i%cols, rr=(i/cols)|0;
    G.trees[i].x=padX+c*gw; G.trees[i].y=padTop+rr*gh; }
}
function makeTree(i){ return {x:0,y:0,r:34,fruit:6,cap:26,quality:0.5,health:1,alive:true,sway:Math.random()*6,id:i,hit:0}; }

function resetSeason(first){
  const g=G;
  g.timeLeft=CFG.seasonLen;
  g.ammo=CFG.ammoBase+g.up.ammo*6;
  g.ladyLeft=1+g.up.lady;
  g.pests.length=0; g.shots.length=0; g.parts.length=0; g.windfalls.length=0;
  g.windTimer=0; g.spawnTimer=1.4; g.splatted=0; g.lostFruit=0; g.sprayUses=0;
  g.player.x=W/2; g.player.y=H*0.62;
  for(const t of g.trees){ if(!t.alive) continue;
    // fruit carries a fresh start each season; quality resets, you must re-thin
    t.fruit=4+g.up.water*1; t.quality=0.42+g.up.prune*0.04; t.health=Math.min(1,t.health+0.25);
  }
  updHUD();
}

// ---------- helpers ----------
function dist(ax,ay,bx,by){ const dx=ax-bx,dy=ay-by; return Math.hypot(dx,dy); }
function rnd(a,b){ return a+Math.random()*(b-a); }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }
let toastT=0;
function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); toastT=1.6; }
function showBanner(msg,t){ banner.textContent=msg; banner.classList.add('show');
  clearTimeout(showBanner._t); showBanner._t=setTimeout(()=>banner.classList.remove('show'),(t||1300)); }
function updHUD(){ const g=G; elCash.textContent='$'+Math.round(g.cash); elEco.textContent=Math.round(g.eco);
  elRep.textContent=g.rep; elSeason.textContent=g.season; elAmmo.textContent=g.ammo;
  ctLady.textContent='×'+g.ladyLeft;
  toolLady.classList.toggle('dim',g.ladyLeft<=0);
}

// ---------- particles ----------
function spawnParts(x,y,color,n,spd){ for(let i=0;i<n;i++){ const a=rnd(0,Math.PI*2),s=rnd(.3,1)*(spd||90);
  G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-30,life:rnd(.3,.7),col:color,r:rnd(2,4)}); } }
function floatText(x,y,txt,col){ G.parts.push({x,y,txt,col:col||'#fff',life:0.9,vy:-46,vx:0,r:0}); }

// ---------- pests ----------
const PESTKIND={
  worm:{ic:'🐛',spd:34,r:13,hp:1,score:1,col:'#9bca3a'},
  fly: {ic:'🪰',spd:66,r:11,hp:1,score:2,col:'#888',fly:true},
  beetle:{ic:'🪲',spd:42,r:15,hp:2,score:3,col:'#5a3a8a'},
};
function spawnPest(){
  const g=G; const alive=g.trees.filter(t=>t.alive); if(!alive.length) return;
  const s=g.season;
  let kind='worm'; const r=Math.random();
  if(s>=2 && r>0.62) kind='fly';
  if(s>=3 && r>0.82) kind='beetle';
  const K=PESTKIND[kind];
  // enter from a random edge
  const edge=(Math.random()*4)|0; let x,y;
  if(edge===0){x=rnd(0,W);y=-20;} else if(edge===1){x=W+20;y=rnd(40,H-90);}
  else if(edge===2){x=rnd(0,W);y=H+20;} else {x=-20;y=rnd(40,H-90);}
  const target=alive[(Math.random()*alive.length)|0];
  g.pests.push({kind,x,y,r:K.r,hp:K.hp,spd:K.spd*rnd(.9,1.12),target,attached:false,wob:Math.random()*6});
}

// ---------- input ----------
let ptrId=null, downX=0,downY=0,downT=0, dragging=false, joyX=0,joyY=0;
const keys={};
function canvasPt(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
cv.addEventListener('pointerdown',e=>{ if(paused)return; if(ptrId!==null)return; ptrId=e.pointerId;
  const p=canvasPt(e); downX=p.x;downY=p.y; downT=performance.now(); dragging=false; cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointermove',e=>{ if(e.pointerId!==ptrId)return; const p=canvasPt(e);
  const dx=p.x-downX, dy=p.y-downY; if(Math.hypot(dx,dy)>14) dragging=true;
  if(dragging){ const m=Math.hypot(dx,dy), mx=Math.min(m,60)/60; joyX=dx/(m||1)*mx; joyY=dy/(m||1)*mx; } });
function endPtr(e){ if(e.pointerId!==ptrId)return; const p=canvasPt(e); const dt=performance.now()-downT;
  if(!dragging && dt<320){ sling(p.x,p.y); }
  ptrId=null; dragging=false; joyX=0; joyY=0; }
cv.addEventListener('pointerup',endPtr); cv.addEventListener('pointercancel',endPtr);
window.addEventListener('keydown',e=>{ keys[e.key.toLowerCase()]=true;
  if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault(); });
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

function sling(tx,ty){ const g=G; if(g.ammo<=0){ sMiss(); showToast('Out of apples — grab windfalls!'); return; }
  const p=g.player; const a=Math.atan2(ty-p.y,tx-p.x);
  g.ammo--; updHUD();
  const spd=460; g.shots.push({x:p.x,y:p.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1.1,r:7});
  p.recoil=0.12; sThrow();
}

// ---------- IPM tools ----------
toolLady.addEventListener('click',()=>{ if(paused)return; const g=G; if(g.ladyLeft<=0){ sMiss(); showToast('No ladybugs left this season'); return; }
  g.ladyLeft--; const p=g.player; let killed=0;
  for(const pe of g.pests){ if(dist(pe.x,pe.y,p.x,p.y)<150){ pe.hp=0; killed++; spawnParts(pe.x,pe.y,'#e23b3b',8,120);} }
  g.eco=clamp(g.eco+3,0,100); spawnParts(p.x,p.y,'#e23b3b',18,160);
  showToast(killed?('🐞 Ladybugs cleared '+killed+' pests  (+Eco)'):'🐞 Ladybugs released  (+Eco)');
  sLady(); updHUD(); });
toolSpray.addEventListener('click',()=>{ if(paused)return; const g=G; let killed=0;
  for(const pe of g.pests){ pe.hp=0; killed++; spawnParts(pe.x,pe.y,'#b6e36a',5,140); }
  g.sprayUses++; g.eco=clamp(g.eco-9,0,100);
  showToast('🧪 Sprayed everything ('+killed+')  −Eco premium'); sSpray(); updHUD(); });

// ---------- update ----------
function update(dt){
  const g=G, p=g.player;
  g.timeLeft-=dt; if(g.timeLeft<=0){ endSeason(); return; }
  timeFill.style.width=clamp(g.timeLeft/CFG.seasonLen,0,1)*100+'%';

  // movement: keyboard overrides joystick
  let mx=joyX, my=joyY;
  let kx=(keys['d']||keys['arrowright']?1:0)-(keys['a']||keys['arrowleft']?1:0);
  let ky=(keys['s']||keys['arrowdown']?1:0)-(keys['w']||keys['arrowup']?1:0);
  if(kx||ky){ const m=Math.hypot(kx,ky); mx=kx/m; my=ky/m; }
  const spd=CFG.baseSpeed*(1+g.up.speed*0.13);
  p.x=clamp(p.x+mx*spd*dt,16,W-16);
  p.y=clamp(p.y+my*spd*dt,46,H-70);
  if(p.recoil>0)p.recoil-=dt;

  // thinning: stand near a tree that still needs quality
  g.thinTree=null;
  for(const t of g.trees){ if(!t.alive)continue;
    if(dist(p.x,p.y,t.x,t.y)<CFG.thinRange && t.quality<1 && t.fruit>3){ g.thinTree=t; break; } }
  if(g.thinTree){ const t=g.thinTree; const before=t.quality;
    t.quality=clamp(t.quality+CFG.thinRate*dt,0,1);
    g.thinShow=clamp(g.thinShow+dt*3,0,1);
    if(t.quality>=1 && before<1){ sThin(); floatText(t.x,t.y-40,'THINNED!','#ffd54a'); g.rep+=0; }
    if(Math.random()<dt*6) spawnParts(t.x+rnd(-18,18),t.y-rnd(0,30),'#cfe8a0',1,40);
  } else g.thinShow=clamp(g.thinShow-dt*4,0,1);

  // trees grow fruit over season
  const growth=(1.4+g.up.water*0.5);
  for(const t of g.trees){ if(!t.alive)continue;
    t.cap=26+g.up.water*5;
    if(t.fruit<t.cap) t.fruit=Math.min(t.cap,t.fruit+growth*dt);
    if(t.hit>0)t.hit-=dt;
  }

  // windfall drops (free ammo) under trees
  g.windTimer-=dt; if(g.windTimer<=0){ g.windTimer=CFG.windfallEvery;
    const al=g.trees.filter(t=>t.alive); if(al.length){ const t=al[(Math.random()*al.length)|0];
      g.windfalls.push({x:t.x+rnd(-26,26),y:t.y+t.r+rnd(4,18),r:9,bob:Math.random()*6}); }
    if(g.windfalls.length>10)g.windfalls.shift();
  }
  for(let i=g.windfalls.length-1;i>=0;i--){ const w=g.windfalls[i]; w.bob+=dt*4;
    if(dist(p.x,p.y,w.x,w.y)<p.r+w.r+4){ const cap=CFG.ammoBase+g.up.ammo*6;
      if(g.ammo<cap){ g.ammo=Math.min(cap,g.ammo+2); updHUD(); sDing(); floatText(w.x,w.y-12,'+2🍎','#fff'); }
      g.windfalls.splice(i,1); } }

  // spawn pests (ramping with season + time)
  g.spawnTimer-=dt;
  if(g.spawnTimer<=0){ const s=g.season;
    const base=Math.max(0.55,1.9-s*0.16); g.spawnTimer=base*rnd(.7,1.25)*(1-g.up.trap*0.15);
    spawnPest(); if(s>=4 && Math.random()<0.3) spawnPest();
  }

  // pests move + attack
  for(const pe of g.pests){ if(pe.hp<=0)continue; const K=PESTKIND[pe.kind];
    let t=pe.target; if(!t||!t.alive){ const al=g.trees.filter(x=>x.alive); if(!al.length)continue; t=pe.target=al[(Math.random()*al.length)|0]; }
    const d=dist(pe.x,pe.y,t.x,t.y); pe.wob+=dt*8;
    if(d>t.r-4){ const a=Math.atan2(t.y-pe.y,t.x-pe.x);
      const wob=pe.kind==='fly'?Math.sin(pe.wob)*0.5:0;
      pe.x+=Math.cos(a+wob)*pe.spd*dt; pe.y+=Math.sin(a+wob)*pe.spd*dt; pe.attached=false; }
    else { pe.attached=true; // chew
      const bite=(pe.kind==='beetle'?4.2:pe.kind==='fly'?2.6:2.0)*dt;
      t.fruit=Math.max(0,t.fruit-bite); g.lostFruit+=bite;
      t.health-=dt*0.05; t.hit=0.15;
      if(Math.random()<dt*8) spawnParts(pe.x,pe.y,'#c0843a',1,30);
      if(t.health<=0){ t.alive=false; t.health=0; spawnParts(t.x,t.y,'#8a5a2a',24,140); sBad(); showBanner('🌳 A tree was lost!',1200);
        if(g.trees.every(x=>!x.alive)){ gameOver(); return; } }
    }
  }

  // shots move + hit pests
  for(const sh of g.shots){ sh.life-=dt; sh.x+=sh.vx*dt; sh.y+=sh.vy*dt;
    if(sh.x<-20||sh.x>W+20||sh.y<-20||sh.y>H+20)sh.life=0;
    for(const pe of g.pests){ if(pe.hp<=0)continue;
      if(dist(sh.x,sh.y,pe.x,pe.y)<pe.r+sh.r){ pe.hp--; sh.life=0;
        spawnParts(pe.x,pe.y,'#fff',5,90); spawnParts(pe.x,pe.y,'#e23b3b',4,90);
        if(pe.hp<=0){ const K=PESTKIND[pe.kind]; g.splatted++; g.cash+=K.score; sSplat();
          spawnParts(pe.x,pe.y,K.col,10,130); floatText(pe.x,pe.y-14,'+$'+K.score,'#ffd54a');
        } else sSplat();
        break; } }
  }
  g.shots=g.shots.filter(s=>s.life>0);
  g.pests=g.pests.filter(pe=>pe.hp>0);

  // eco slow drift toward sustainable if you don't spray a lot
  // (handled at season end)

  // particles
  for(const pa of g.parts){ pa.life-=dt; pa.x+=(pa.vx||0)*dt; pa.y+=pa.vy*dt; if(pa.vy!==undefined&&pa.txt===undefined)pa.vy+=420*dt; }
  g.parts=g.parts.filter(p=>p.life>0);

  if(toastT>0){ toastT-=dt; if(toastT<=0)toast.classList.remove('show'); }
}

// ---------- render ----------
function draw(){
  const g=G;
  // ground stripes
  for(let i=0;i<10;i++){ ctx.fillStyle=i%2?'#6fae4f':'#69a849'; ctx.fillRect(0,i*H/10,W,H/10+1); }
  // soil rows under trees
  for(const t of g.trees){ ctx.fillStyle='rgba(124,90,58,.30)'; ctx.beginPath();
    ctx.ellipse(t.x,t.y+t.r+6,t.r+10,12,0,0,Math.PI*2); ctx.fill(); }

  // windfalls
  for(const w of g.windfalls){ const yy=w.y+Math.sin(w.bob)*1.5;
    ctx.font='17px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🍎',w.x,yy); }

  // trees
  for(const t of g.trees){ drawTree(t); }

  // thinning ring
  if(g.thinTree && g.thinShow>0.02){ const t=g.thinTree;
    ctx.save(); ctx.globalAlpha=g.thinShow; ctx.strokeStyle='#ffe08a'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r+12,-Math.PI/2,-Math.PI/2+Math.PI*2*t.quality); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='700 11px system-ui'; ctx.textAlign='center';
    ctx.fillText('thinning…',t.x,t.y-t.r-20); ctx.restore(); }

  // pests
  for(const pe of g.pests){ const K=PESTKIND[pe.kind]; const yy=pe.y+(pe.kind==='fly'?Math.sin(pe.wob)*3:0);
    ctx.font=(pe.r+8)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(K.ic,pe.x,yy); }

  // shots (apples)
  for(const sh of g.shots){ ctx.font='15px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🍎',sh.x,sh.y); }

  // player
  drawPlayer(g.player);

  // particles
  for(const pa of g.parts){ if(pa.txt!==undefined){ ctx.save(); ctx.globalAlpha=clamp(pa.life,0,1);
      ctx.fillStyle=pa.col; ctx.font='800 14px system-ui'; ctx.textAlign='center'; ctx.fillText(pa.txt,pa.x,pa.y); ctx.restore(); }
    else { ctx.save(); ctx.globalAlpha=clamp(pa.life*1.4,0,1); ctx.fillStyle=pa.col;
      ctx.beginPath(); ctx.arc(pa.x,pa.y,pa.r,0,Math.PI*2); ctx.fill(); ctx.restore(); } }
}
function drawTree(t){
  const x=t.x, y=t.y;
  if(!t.alive){ // dead stump
    ctx.fillStyle='#6b4a2c'; ctx.fillRect(x-7,y-2,14,26);
    ctx.strokeStyle='#4a3220'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-14,y-14);
    ctx.moveTo(x,y); ctx.lineTo(x+12,y-16); ctx.stroke(); return; }
  // trunk
  ctx.fillStyle='#7a5230'; ctx.fillRect(x-7,y+6,14,30);
  // canopy
  const shake=t.hit>0?Math.sin(performance.now()/30)*2:0;
  ctx.fillStyle=t.health<0.5?'#3c7e36':'#46a04a';
  ctx.beginPath(); ctx.arc(x+shake,y,t.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=t.health<0.5?'#347030':'#3f9444';
  ctx.beginPath(); ctx.arc(x-t.r*0.5+shake,y+4,t.r*0.6,0,Math.PI*2);
  ctx.arc(x+t.r*0.55+shake,y+2,t.r*0.55,0,Math.PI*2); ctx.fill();
  // apples — count scales with fruit, color/size with quality
  const n=Math.min(11,Math.round(t.fruit/2.4));
  const sz=2.6+t.quality*2.2;
  for(let i=0;i<n;i++){ const a=(i*2.39996)+t.id; const rr=t.r*0.7*Math.sqrt((i+0.5)/n);
    const ax=x+Math.cos(a)*rr+shake, ay=y+Math.sin(a)*rr;
    ctx.fillStyle=t.quality>0.85?'#e23b3b':t.quality>0.6?'#e8593b':'#cf7a3a';
    ctx.beginPath(); ctx.arc(ax,ay,sz,0,Math.PI*2); ctx.fill(); }
  // health pip
  if(t.health<1){ ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fillRect(x-16,y-t.r-12,32,5);
    ctx.fillStyle=t.health<0.4?'#e23b3b':'#ffd54a'; ctx.fillRect(x-16,y-t.r-12,32*t.health,5); }
}
function drawPlayer(p){
  const x=p.x,y=p.y;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(x,y+15,13,5,0,0,Math.PI*2); ctx.fill();
  // body (overalls)
  ctx.fillStyle='#2f6fb0'; ctx.beginPath(); ctx.arc(x,y+2,12,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle='#f0c89a'; ctx.beginPath(); ctx.arc(x,y-12,8,0,Math.PI*2); ctx.fill();
  // straw hat
  ctx.fillStyle='#e0b349'; ctx.beginPath(); ctx.ellipse(x,y-16,12,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x,y-19,6,5,0,0,Math.PI*2); ctx.fill();
  // arm with apple when recoiling
  if(p.recoil>0){ ctx.font='13px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🍎',x+12,y-4); }
}

// ---------- main loop ----------
function frame(t){
  requestAnimationFrame(frame);
  if(!running)return;
  const dt=Math.min(0.05,(t-lastT)/1000||0); lastT=t;
  if(!paused){ update(dt); }
  if(G&&G.trees.length) draw();
}

// ---------- season end / economy ----------
function endSeason(){
  paused=true; const g=G;
  // compute harvest
  let crates=0, qualitySum=0, live=0;
  for(const t of g.trees){ if(!t.alive)continue; live++;
    const yield_=t.fruit*t.quality*t.health; crates+=yield_; qualitySum+=t.quality; }
  const avgQ=live?qualitySum/live:0;
  g._harvest={crates:Math.round(crates), avgQ, live};
  sellScreen();
}

function sellScreen(){
  const g=G, h=g._harvest;
  const ecoPrem=1+ (g.eco/100)*0.6;           // up to ×1.6 organic premium
  const sign=1+g.up.sign*0.12;
  const base=h.crates;                         // 1 "crate-unit" ≈ $1 baseline
  const farmstand=Math.round(base*4.0*ecoPrem*sign);
  const wholesale=Math.round(base*2.1);
  const upickBase=Math.round(base*4.6*ecoPrem);
  const visitors=Math.round(8+g.rep*1.6);
  const upick=Math.round(upickBase + visitors*3);
  const upickTrample=Math.round(base*0.18);    // shown as risk
  showOverlay(`
    <h1>🍎 Harvest — Season ${g.season}</h1>
    <div class="card">
      <div class="rows">
        <div class="r"><span>Crates harvested</span><b>${h.crates}</b></div>
        <div class="r"><span>Avg quality</span><b>${Math.round(h.avgQ*100)}%</b></div>
        <div class="r"><span>Eco premium</span><b>×${ecoPrem.toFixed(2)}</b></div>
        <div class="r"><span>Trees standing</span><b>${h.live}/6</b></div>
      </div>
      <p style="margin-bottom:6px;font-weight:800">Choose your sales channel:</p>
      <button class="btn green" id="cFarm">🧺 Farmstand (D2C)
        <small>+$${farmstand} · rewards Eco & your Farmstand Sign</small></button>
      <button class="btn gold" id="cUpick">🚜 U-Pick Agrotourism
        <small>+$${upick} &nbsp;·&nbsp; ${visitors} visitors → +Fans, but they trample ~$${upickTrample}</small></button>
      <button class="btn" id="cWhole" style="background:#9a7b52;box-shadow:0 4px 0 #6e5538">🏷️ Wholesale
        <small>+$${wholesale} · fast & safe, no premium</small></button>
    </div>
    <div class="tip">Direct-to-consumer pays most when your <b>Eco</b> is high. Agrotourism builds <b>Fans</b> (more visitors next time) but costs you some fruit.</div>
  `);
  $('cFarm').onclick=()=>{ g.cash+=farmstand; sDing(); afterSell('Sold '+h.crates+' crates at the farmstand.'); };
  $('cWhole').onclick=()=>{ g.cash+=wholesale; sDing(); afterSell('Trucked '+h.crates+' crates to wholesale.'); };
  $('cUpick').onclick=()=>{ g.cash+=upick-upickTrample; g.rep+=Math.max(2,Math.round(visitors/4)); sDing();
    afterSell(visitors+' visitors came to pick. +Fans!'); };
}
function afterSell(msg){ // eco regen if you barely sprayed
  const g=G; if(g.sprayUses===0) g.eco=clamp(g.eco+5,0,100); else g.eco=clamp(g.eco+1,0,100);
  updHUD(); showToast(msg); dramaScreen();
}

// ---------- local drama ----------
const DRAMA=[
  {t:"Neighbor Earl says your dawn tractor wakes his hens.",
   a:{l:"Apologize & gift a crate (−$15, +2 Fans)",f:g=>{g.cash-=15;g.rep+=2;}},
   b:{l:"Rev it louder (−2 Fans)",f:g=>{g.rep=Math.max(0,g.rep-2);}}},
  {t:"The county fair wants your cider for their tasting tent.",
   a:{l:"Enter the contest (−$10, +3 Fans)",f:g=>{g.cash-=10;g.rep+=3;}},
   b:{l:"Too busy this year",f:g=>{}}},
  {t:"A farm-to-table chef offers a standing weekly order.",
   a:{l:"Sign the deal (+$30 now)",f:g=>{g.cash+=30;}},
   b:{l:"Stay independent (+1 Fan)",f:g=>{g.rep+=1;}}},
  {t:"Aphids are bad this year. The co-op pushes a cheap pesticide.",
   a:{l:"Buy ladybugs instead (−$12, +Eco)",f:g=>{g.cash-=12;g.eco=clamp(g.eco+8,0,100);}},
   b:{l:"Spray it (−Eco, +$8 saved)",f:g=>{g.cash+=8;g.eco=clamp(g.eco-12,0,100);}}},
  {t:"Local paper wants to feature your orchard.",
   a:{l:"Host the reporter (−$8, +4 Fans)",f:g=>{g.cash-=8;g.rep+=4;}},
   b:{l:"Decline the spotlight",f:g=>{}}},
  {t:"Heatwave forecast. Irrigation could save the crop.",
   a:{l:"Run the pumps (−$18, trees healthier)",f:g=>{g.cash-=18;for(const t of g.trees)t.health=Math.min(1,t.health+0.3);}},
   b:{l:"Risk it (some fruit stress)",f:g=>{for(const t of g.trees)t.health=Math.max(0.2,t.health-0.12);}}},
  {t:"A school asks for a field trip to your orchard.",
   a:{l:"Welcome the kids (+3 Fans)",f:g=>{g.rep+=3;}},
   b:{l:"Charge admission (+$12)",f:g=>{g.cash+=12;}}},
];
function dramaScreen(){
  const g=G; const d=DRAMA[(Math.random()*DRAMA.length)|0];
  showOverlay(`
    <h2>📰 Local Drama</h2>
    <div class="card">
      <p style="font-weight:700;font-size:15px">${d.t}</p>
      <button class="btn green" id="dA">${d.a.l}</button>
      <button class="btn" id="dB" style="background:#9a7b52;box-shadow:0 4px 0 #6e5538">${d.b.l}</button>
    </div>
    <div class="tip">Small-town choices add up — Fans bring agrotourism crowds, Eco lifts your direct-sale price.</div>
  `);
  $('dA').onclick=()=>{ d.a.f(g); updHUD(); shopScreen(); };
  $('dB').onclick=()=>{ d.b.f(g); updHUD(); shopScreen(); };
}

// ---------- shop ----------
const SHOP=[
  {k:'prune',ic:'✂️',n:'Sharper Pruners',d:'Trees start each season at higher quality.',base:18,inc:14,max:4},
  {k:'ammo', ic:'🍎',n:'Apple Satchel',d:'+6 starting apples / season.',base:16,inc:12,max:4},
  {k:'lady', ic:'🐞',n:'Ladybug House',d:'+1 ladybug release per season.',base:22,inc:16,max:3},
  {k:'water',ic:'💧',n:'Drip Irrigation',d:'Bigger crop & hardier trees.',base:24,inc:18,max:3},
  {k:'trap', ic:'🪤',n:'Pheromone Traps',d:'Pests spawn slower (IPM).',base:26,inc:20,max:3},
  {k:'sign', ic:'🪧',n:'Farmstand Sign',d:'+12% direct-to-consumer price.',base:20,inc:16,max:4},
  {k:'speed',ic:'👢',n:'Trail Boots',d:'Move around the orchard faster.',base:15,inc:12,max:3},
];
function priceOf(s,g){ return s.base+s.inc*g.up[s.k]; }
function shopScreen(){
  const g=G;
  let rows='';
  for(const s of SHOP){ const lvl=g.up[s.k], maxed=lvl>=s.max, pr=priceOf(s,g);
    rows+=`<div class="shoprow"><div class="si">${s.ic}</div>
      <div class="st"><div class="sn">${s.n} ${lvl?`<span style="color:#3fa34d">Lv${lvl}</span>`:''}</div>
        <div class="sd">${s.d}</div></div>
      <button class="buy" data-k="${s.k}" ${maxed||g.cash<pr?'disabled':''}>${maxed?'MAX':'$'+pr}</button></div>`; }
  showOverlay(`
    <h2>🛒 Farm Shop</h2>
    <div class="sub">Cash on hand: <b style="color:#ffd54a">$${Math.round(g.cash)}</b> · Eco ${Math.round(g.eco)} · Fans ${g.rep}</div>
    <div class="card" style="max-width:420px">${rows}</div>
    <button class="btn green" id="nextSeason" style="max-width:420px">▶ Start Season ${g.season+1}</button>
  `);
  ov.querySelectorAll('.buy').forEach(b=>{ b.onclick=()=>{ const k=b.dataset.k; const s=SHOP.find(x=>x.k===k);
    const pr=priceOf(s,g); if(g.cash>=pr && g.up[k]<s.max){ g.cash-=pr; g.up[k]++; sDing(); updHUD(); shopScreen(); } }; });
  $('nextSeason').onclick=()=>{ g.season++; resetSeason(); hideOverlay();
    showBanner('🌳 Season '+g.season,1100); paused=false; };
}

// ---------- game over ----------
function gameOver(){
  paused=true; const g=G;
  showOverlay(`
    <h1>Orchard Lost</h1>
    <div class="sub">Every tree fell to the pests. The farm is done — for now.</div>
    <div class="card">
      <div class="rows">
        <div class="r"><span>Seasons survived</span><b>${g.season}</b></div>
        <div class="r"><span>Final cash</span><b>$${Math.round(g.cash)}</b></div>
        <div class="r"><span>Fans earned</span><b>${g.rep}</b></div>
        <div class="r"><span>Pests splatted</span><b>${g.splatted}</b></div>
      </div>
      <button class="btn green" id="again">Plant a New Orchard</button>
    </div>
  `);
  $('again').onclick=()=>{ newRun(); hideOverlay(); titleScreen(); };
}

// ---------- overlays ----------
function showOverlay(html){ ov.innerHTML=html; ov.classList.add('show'); }
function hideOverlay(){ ov.classList.remove('show'); }

function titleScreen(){
  paused=true;
  showOverlay(`
    <h1>APPLE&nbsp;FARMER<br>SIMULATOR</h1>
    <div class="sub">You inherited six apple trees and a head full of opinions about pest management. Make the orchard pay.</div>
    <button class="btn green" id="play" style="max-width:340px">Start Farming</button>
    <div class="tip" style="max-width:380px">
      <b>Move</b> — drag anywhere (joystick) or use <b>WASD / arrows</b>.<br>
      <b>Sling apples</b> — tap/click where you want to throw. Splat pests for cash.<br>
      <b>Thin fruit</b> — stand by a tree to raise its quality (worth more at harvest).<br>
      <b>Reload</b> — walk over fallen 🍎 windfalls.<br>
      <b>IPM</b> — 🐞 ladybugs are clean & boost Eco; 🧪 spray is brutal but tanks your organic premium.<br>
      Survive the season, sell your crop, ride the local drama. Lose every tree and it's over.
    </div>
  `);
  $('play').onclick=()=>{ ac(); hideOverlay(); resetSeason(); showBanner('🌳 Season 1',1100); paused=false; };
}

// ---------- mute ----------
muteBtn.addEventListener('click',()=>{ muted=!muted; muteBtn.textContent=muted?'🔇':'🔊'; });

// ---------- boot ----------
resize();
newRun();
running=true; lastT=performance.now();
requestAnimationFrame(frame);
titleScreen();
})();
</script>
